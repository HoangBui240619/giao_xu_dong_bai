backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Bài viết"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Người đăng", name: "author", widget: "string" }
      - { label: "Ảnh", name: "image", widget: "image", required: false }
      - { label: "Nội dung", name: "body", widget: "markdown" }
