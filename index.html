<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giáo Xứ Đồng Bài</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white p-6 text-center">
<h1 class="text-3xl font-bold">GIÁO XỨ ĐỒNG BÀI</h1>
<p>Trang tin tức</p>
</header>

<div class="max-w-3xl mx-auto p-6">
<h2 class="text-xl font-bold mb-4">Tin mới</h2>
<div id="posts"></div>
</div>

<script>
const repo = "TEN_GITHUB_CUA_BAN/giaoxu-dongbai";

async function loadPosts(){
  const res = await fetch(`https://api.github.com/repos/${repo}/contents/posts`);
  const data = await res.json();

  let html = "";
  for(const file of data){
    html += `
      <div class="bg-white p-4 rounded mb-4 shadow">
        <h3 class="font-bold text-lg">${file.name}</h3>
        <a href="${file.html_url}" target="_blank" class="text-blue-600">Xem bài viết</a>
      </div>
    `;
  }
  document.getElementById("posts").innerHTML = html;
}

loadPosts();
</script>

</body>
</html>
