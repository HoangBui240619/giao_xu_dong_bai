<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giáo Xứ Đồng Bài</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-900 text-white p-6 text-center">
<h1 class="text-3xl font-bold">GIÁO XỨ ĐỒNG BÀI</h1>
<p>Trang tin tức giáo xứ</p>
</header>

<div class="max-w-3xl mx-auto p-6">
<h2 class="text-xl font-bold mb-4">Tin mới</h2>
<div id="posts"></div>
</div>

<script>
const repo = "REPLACE_USERNAME/giaoxu-dongbai";

async function loadPosts(){
  const res = await fetch(`https://api.github.com/repos/${repo}/contents/posts`);
  const files = await res.json();

  let html = "";

  for(const file of files){
    const raw = await fetch(file.download_url);
    const text = await raw.text();

    html += `
      <div class="bg-white p-4 rounded mb-6 shadow">
        <div class="prose">${marked.parse(text)}</div>
      </div>
    `;
  }

  document.getElementById("posts").innerHTML = html;
}

loadPosts();
</script>

</body>
</html>
