<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giáo Xứ Đồng Bài</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-blue-900 text-white p-6 text-center shadow">
<h1 class="text-3xl font-bold">GIÁO XỨ ĐỒNG BÀI</h1>
<p>Trang thông tin - truyền thông</p>
</header>

<!-- PROGRESS -->
<section class="bg-white p-6 text-center">
<h2 class="text-xl font-semibold mb-2">Tiến độ xây dựng</h2>
<div class="max-w-xl mx-auto bg-gray-200 rounded-full h-6">
<div class="bg-blue-700 h-6 rounded-full text-white text-sm flex items-center justify-center" style="width:4%">4%</div>
</div>
<p class="mt-2">2 / 45 tỷ VNĐ</p>
</section>

<!-- NEWS -->
<section class="max-w-5xl mx-auto p-6">
<h2 class="text-2xl font-bold mb-4">Tin mới nhất</h2>
<div id="posts" class="grid md:grid-cols-2 gap-6"></div>
</section>

<script>
const repo = "REPLACE_USERNAME/giaoxu-dongbai";

async function loadPosts(){
  const res = await fetch(`https://api.github.com/repos/${repo}/contents/posts`);
  const files = await res.json();

  let html = "";

  for(const file of files.reverse()){
    const raw = await fetch(file.download_url);
    const text = await raw.text();

    html += `
      <div class="bg-white p-4 rounded-xl shadow hover:shadow-lg transition">
        <div class="prose max-w-none">${marked.parse(text)}</div>
      </div>
    `;
  }

  document.getElementById("posts").innerHTML = html;
}

loadPosts();
</script>

<footer class="bg-gray-800 text-white text-center p-4 mt-10">
© 2026 Giáo Xứ Đồng Bài
</footer>

</body>
</html>
